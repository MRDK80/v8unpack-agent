[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "v8unpack-agent"
version = "0.1.0"
description = "Agent-pipeline adapter for v8unpack: path factory, FormArtifact, drift index"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
dependencies = [
    "v8unpack>=1.2",
]

[project.urls]
Homepage = "https://github.com/MRDK80/v8unpack-agent"
